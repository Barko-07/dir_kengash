{% extends 'admin_base.html' %}
{% block title %}O'chirishni tasdiqlash{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-slate-800/50 border border-red-500/20 rounded-2xl p-10 text-center">
        <div class="w-16 h-16 rounded-full bg-red-500/15 flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-triangle-exclamation text-red-400 text-2xl"></i>
        </div>
        <h1 class="text-xl font-extrabold text-white mb-3">O'chirishni tasdiqlaysizmi?</h1>
        <p class="text-slate-400 text-sm mb-2">Quyidagi elementni o'chirmoqchisiz:</p>
        <p class="text-white font-semibold mb-1">{{ type }}:</p>
        <p class="text-slate-300 bg-slate-700/50 px-4 py-2 rounded-xl text-sm mb-8">{{ object }}</p>
        <p class="text-red-400 text-xs mb-8">⚠️ Bu amalni qaytarib bo'lmaydi!</p>
        <div class="flex gap-3 justify-center">
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn-admin-danger px-6 py-3 text-sm rounded-xl">
                    <i class="fa-solid fa-trash"></i> Ha, o'chirish
                </button>
            </form>
            <a onclick="history.back()" class="btn-admin-edit cursor-pointer px-6 py-3 text-sm rounded-xl">
                <i class="fa-solid fa-arrow-left"></i> Bekor qilish
            </a>
        </div>
    </div>
</div>
{% endblock %}
