<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Kirish | DirKengash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .admin-input {
            width: 100%; background: #1e293b; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 12px 16px; color: #e2e8f0; font-size: 0.9rem;
            outline: none; transition: border-color 0.2s;
        }
        .admin-input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mx-auto mb-5 shadow-lg shadow-indigo-500/30">
                <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Admin Kirish</h1>
            <p class="text-slate-400 text-sm mt-2">Faqat vakolatli foydalanuvchilar uchun</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/20 text-red-300 px-5 py-4 rounded-xl mb-6 text-sm flex items-center gap-3">
            <i class="fa-solid fa-circle-exclamation shrink-0"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <div class="bg-slate-800/50 border border-white/5 rounded-3xl p-8 shadow-2xl backdrop-blur-sm">
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-slate-400 text-sm font-semibold mb-2">Foydalanuvchi nomi</label>
                    <div class="relative">
                        <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="text" name="username" class="admin-input pl-11" placeholder="Admin login" autofocus>
                    </div>
                </div>
                <div>
                    <label class="block text-slate-400 text-sm font-semibold mb-2">Parol</label>
                    <div class="relative">
                        <i class="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                        <input type="password" name="password" class="admin-input pl-11" placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:opacity-90 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-500/25 flex items-center justify-center gap-2 mt-2">
                    <i class="fa-solid fa-sign-in-alt"></i> Kirish
                </button>
            </form>
        </div>

        <div class="text-center mt-6">
            <a href="{% url 'index' %}" class="text-slate-500 hover:text-slate-300 text-sm transition-colors">
                <i class="fa-solid fa-arrow-left mr-1"></i> Saytga qaytish
            </a>
        </div>
    </div>
</body>
</html>
