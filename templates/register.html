{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-12 mb-20 animate-slide-up">
    <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 p-10 relative overflow-hidden">
        <!-- Abstract Decoration -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>
        
        <div class="relative z-10">
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 text-2xl mx-auto mb-5 shadow-inner">
                    <i class="fa-solid fa-user-plus"></i>
                </div>
                <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Ro'yxatdan o'tish</h2>
                <p class="text-slate-500 text-sm mt-2 font-medium">Yangi hisob yarating</p>
            </div>
            
            {% if error %}
            <div class="bg-red-50 border border-red-100 text-red-600 px-5 py-4 rounded-xl mb-8 text-sm flex items-start gap-3 shadow-sm">
                <i class="fa-solid fa-circle-exclamation mt-0.5 text-red-500"></i>
                <span class="font-medium">{{ error }}</span>
            </div>
            {% endif %}
            
            <form method="post" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-slate-700 text-sm font-bold mb-2 ml-1">Foydalanuvchi nomi</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i class="fa-solid fa-user text-sm"></i>
                        </div>
                        <input type="text" name="username" autocomplete="username" required
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 focus:bg-white transition-all shadow-sm"
                            placeholder="Login yarating">
                    </div>
                </div>
                <div>
                    <label class="block text-slate-700 text-sm font-bold mb-2 ml-1">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i class="fa-solid fa-envelope text-sm"></i>
                        </div>
                        <input type="email" name="email" autocomplete="email"
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 focus:bg-white transition-all shadow-sm"
                            placeholder="email@example.com">
                    </div>
                </div>
                <div>
                    <label class="block text-slate-700 text-sm font-bold mb-2 ml-1">Parol</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i class="fa-solid fa-key text-sm"></i>
                        </div>
                        <input type="password" name="password" id="reg-password" autocomplete="new-password" required
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-12 py-3.5 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 focus:bg-white transition-all shadow-sm"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePassword('reg-password', 'reg-eye')"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-500 transition-colors p-1">
                            <i id="reg-eye" class="fa-solid fa-eye-slash"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-slate-700 text-sm font-bold mb-2 ml-1">Rol</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400">
                            <i class="fa-solid fa-id-card text-sm"></i>
                        </div>
                        <select name="role" class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3.5 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 focus:bg-white transition-all shadow-sm appearance-none font-medium">
                            <option value="direktor">Maktab Direktori</option>
                            <option value="pedagog">Pedagogika Xodimi</option>
                        </select>
                        <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-slate-400">
                            <i class="fa-solid fa-chevron-down text-sm"></i>
                        </div>
                    </div>
                </div>
                
                <button type="submit"
                    class="w-full btn-primary py-4 rounded-xl mt-4 text-base font-bold flex justify-center items-center gap-2 group">
                    Ro'yxatdan o'tish <i class="fa-solid fa-check group-hover:scale-110 transition-transform"></i>
                </button>
            </form>
            
            <p class="text-center text-slate-500 mt-10 text-sm font-medium">Akkauntingiz bormi?
                <a href="{% url 'login' %}" class="text-blue-600 hover:text-blue-700 font-bold hover:underline ml-1">Kirish</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePassword(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    }
}
</script>
{% endblock %}
